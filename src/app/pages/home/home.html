<div class="user-container">
  <h2>User List</h2>

  <div class="user-grid">
    <div class="user-card" *ngFor="let user of users">

      <h3>{{ user.name }}</h3>
      <p>{{ user.role }}</p>

      <a class="btn" [routerLink]="['/user', user.id]">
        View Details
      </a>

    </div>
  </div>
</div>
